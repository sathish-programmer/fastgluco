server {
    listen 80;
    server_name fastgluco.com www.fastgluco.com admin.fastgluco.com;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name fastgluco.com www.fastgluco.com;

    # SSL Certificates (Managed via Let's Encrypt / Certbot)
    ssl_certificate /etc/letsencrypt/live/fastgluco.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fastgluco.com/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    # Max upload size (Important for Abbott CSV/PDF reports)
    client_max_body_size 15M;

    # Gzip compression for faster asset delivery
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Route 1: Express REST API reverse proxy
    location /api/ {
        proxy_pass http://localhost:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Route 2: Static local file uploads
    location /uploads/ {
        alias /var/www/fastgluco-backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Route 3: Marketing Website Client
    location / {
        root /var/www/fastgluco-website/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl http2;
    server_name admin.fastgluco.com;

    ssl_certificate /etc/letsencrypt/live/fastgluco.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fastgluco.com/privkey.pem;

    # Route 4: Administrative Dashboard React Client
    location / {
        root /var/www/fastgluco-admin/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
